services:
  ssh:
    build:
      context: ./ssh-server
      args:
        E2E_SSH_BASE_IMAGE: "${E2E_SSH_BASE_IMAGE:-debian:bookworm-slim}"
    ports:
      - "127.0.0.1::22"
    volumes:
      - "${E2E_REMOTE_FIXTURE:?E2E_REMOTE_FIXTURE is required}:/fixture:ro"
      - "${E2E_AUTHORIZED_KEYS:?E2E_AUTHORIZED_KEYS is required}:/authorized_keys:ro"
