[tools]
python = "3.12"
uv = "latest"
actionlint = "latest"
action-validator = "0.9.0"
zizmor = "1.27.0"
hk = "latest"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all --no-stage"

[tasks.test]
run = "uv run pytest -m 'not e2e'"

[tasks."build:pex"]
run = "uv run --frozen --no-default-groups --group release python scripts/build_pex.py"

[tasks."test:e2e"]
description = "Run SSH E2E tests on every qualified GNU tar version"
depends = ["test:e2e:tar-1-34", "test:e2e:tar-1-35"]

[tasks."test:e2e:tar-1-34"]
description = "Run SSH E2E tests on Debian Bookworm with GNU tar 1.34"
env = { E2E_EXPECTED_TAR_VERSION = "1.34", E2E_SSH_BASE_IMAGE = "debian:bookworm-slim" }
run = "uv run pytest -m e2e tests/e2e"

[tasks."test:e2e:tar-1-35"]
description = "Run SSH E2E tests on Debian Trixie with GNU tar 1.35"
env = { E2E_EXPECTED_TAR_VERSION = "1.35", E2E_SSH_BASE_IMAGE = "debian:trixie-slim" }
run = "uv run pytest -m e2e tests/e2e"

[tasks."test:e2e:pex"]
description = "Build the PEX and run SSH E2E tests on GNU tar 1.35"
depends = ["build:pex"]
env = { E2E_EXPECTED_TAR_VERSION = "1.35", E2E_SSH_BASE_IMAGE = "debian:trixie-slim", SSH_ARCHIVE_DEPLOY_E2E_EXECUTABLE = "{{config_root}}/dist/release/ssh-archive-deploy-linux-x86_64.pex" }
run = "uv run pytest -m e2e tests/e2e"

[tasks.lock]
run = "mise lock"
